name: Deploy

# Build images on push to main and publish them to GHCR.
# The production server runs Watchtower, which polls GHCR (~5 min) and
# recreates the containers automatically — no SSH deploy step here.
on:
  push:
    branches: [main]

# Supply-chain hardening: minimal default permissions (грабли #15).
permissions:
  contents: read

jobs:
  build-and-push:
    name: Build and push Docker images to GHCR
    runs-on: ubuntu-latest
    # Only this job needs to write packages (грабли #8, #15).
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - name: app
            dockerfile: Dockerfile.app
            context: .
          - name: mcp
            dockerfile: Dockerfile.mcp
            context: .

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # Built-in token, no extra PAT needed for push (грабли #8).
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104db # v3

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          # latest for Watchtower; sha-<sha> enables rollback to a specific build.
          tags: |
            ghcr.io/${{ github.repository_owner }}/procure-ai-${{ matrix.name }}:latest
            ghcr.io/${{ github.repository_owner }}/procure-ai-${{ matrix.name }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
