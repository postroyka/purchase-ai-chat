allowBuilds:
  '@parcel/watcher': true
  better-sqlite3: true
  esbuild: true
  unrs-resolver: true
  vue-demi: true

# Transitive dependency overrides remediating Dependabot/security advisories.
# pnpm v11 promotes pnpm-workspace.yaml as the canonical location for overrides;
# the package.json "pnpm" field is deprecated in v11 (it still works in v10).
#
# Caret ranges (not open-ended ">=") keep builds reproducible and patch/minor
# fixes flowing while blocking surprise major bumps from `pnpm update` /
# Renovate lockFileMaintenance. Remove each entry once the direct dependency
# resolves a safe version on its own (run `pnpm audit` after dropping it).
overrides:
  # GHSA-52f5-9888-hmc6 — arbitrary temp file write via symlink (tmp <0.2.6)
  # via @anthropic-ai/mcpb > @inquirer/prompts > … > external-editor
  tmp: '^0.2.6'
  # GHSA-5v7r-6r5c-r473 — infinite loop in ASF parser (file-type <21.3.1); via evalite (dev)
  file-type: '^22.0.1'
  # GHSA-pr96-94w5-mx2h — path traversal in directory listing (@fastify/static <=9.1.0); via evalite (dev)
  '@fastify/static': '^9.1.1'
  # GHSA-6rw7-vpxm-498p — arrayLimit bypass DoS (qs <=6.15.1); via @modelcontextprotocol/sdk > express
  qs: '^6.15.2'
  # GHSA-gv7w-rqvm-qjhr — esbuild missing binary integrity verification (esbuild <0.28.1).
  # 24 transitive paths via @bitrix24/b24ui-nuxt > vite, @nuxtjs/mcp-toolkit > vite, etc.
  # Direct devDep is also bumped to ^0.28.1 in package.json — override pins every
  # transitive copy at the same fix level.
  esbuild: '^0.28.1'
  # GHSA-hmw2-7cc7-3qxx — CRLF injection in `form-data` (<4.0.6). Reachable in
  # PRODUCTION via `axios > form-data` from `@bitrix24/b24jssdk` (every outbound
  # REST call to Bitrix24 uses it). HIGH severity. Pin to the patched minor;
  # remove once axios upstream pulls the fix on its own.
  form-data: '^4.0.6'
  # GHSA-vmf3-w455-68vh — file-smuggling tar parser interpretation differential
  # (`tar` <=7.5.15) via `nuxt > @nuxt/nitro-server > nitropack > @vercel/nft >
  # @mapbox/node-pre-gyp > tar`. Build-only path; bumped defensively to keep
  # `pnpm audit` clean. Remove once the @vercel/nft chain ships >=7.5.16.
  tar: '^7.5.16'
  # GHSA-v6wh-96g9-6wx3 — NTLMv2 hash disclosure via UNC path in `launch-editor`
  # (<=2.14.0). Reached via `vite` (>=7.0.0 <=7.3.4) and via `@nuxt/devtools`.
  # Windows-only attack surface, dev-mode editor-open path; pinned so `pnpm audit`
  # stays green on CI. Remove once Nuxt/Vite cut a fix on their own.
  vite: '^7.3.5'
  launch-editor: '^2.14.1'
  # GHSA-h67p-54hq-rp68 — quadratic-complexity DoS in `js-yaml` merge-key handling
  # (<=4.1.1) via `@commitlint/cli > cosmiconfig > js-yaml` and `@nuxt/eslint >
  # eslint-typegen > … > js-yaml`. Dev-only paths, but the audit gate is dev-aware
  # so pin to the patched minor.
  js-yaml: '^4.1.2'
