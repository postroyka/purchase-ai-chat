name: Deploy

# Build images and publish them to GHCR.
#
# Human-in-the-loop release gate (#104) — a green CI is NOT, by itself, "ship to prod"
# (the live Bitrix24 box isn't covered by tests). So pushing to main no longer moves
# production:
#   • Push to main, CI passes  → build immutable sha-<sha> images ONLY (rollback
#     artifacts). Production is untouched — Watchtower only follows :latest.
#   • Push a v* tag            → build :latest + :<tag> + sha-<sha>. Cutting the release
#     tag IS the deliberate human action that ships to prod.
#   • Manual workflow_dispatch → escape hatch; builds :latest + sha-<sha>, but ONLY after
#     verifying CI for that exact commit is green (it used to bypass the CI gate entirely).
#
# The production server runs Watchtower, which polls GHCR (~5 min) for :latest and
# recreates the containers automatically — no SSH deploy step here.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  push:
    tags: ['v*']
  workflow_dispatch:

# Group per triggering COMMIT so a later main push can't cancel an in-flight release, and
# a tag + manual dispatch of the same commit serialize (don't both push :latest at once).
# Re-runs targeting the same commit still supersede each other.
concurrency:
  group: deploy-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

# Supply-chain hardening: minimal default permissions.
permissions:
  contents: read

jobs:
  # Enforce a GREEN CI on the exact commit before any deploy that moves :latest — both the
  # manual escape hatch (workflow_dispatch) AND a v* release tag (a tag can be pushed onto
  # any commit, incl. one that never passed CI). The workflow_run trigger is already CI-gated
  # by definition (it only fires after CI completes), so this check is skipped there.
  verify-ci:
    name: Verify CI is green for this commit
    runs-on: ubuntu-latest
    permissions:
      actions: read   # read the CI workflow's run conclusions for this SHA
    steps:
      - name: Require a green CI run on this SHA (release tag & manual dispatch)
        if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sha="${{ github.sha }}"
          # Take the MOST RECENT completed CI run for this commit — a re-run can flip the
          # result, so "is the latest run green", not "was any run ever green".
          latest="$(gh api -X GET \
            "repos/${{ github.repository }}/actions/workflows/ci.yml/runs" \
            -f head_sha="$sha" -f status=completed \
            --jq '[.workflow_runs[]] | sort_by(.created_at) | last | .conclusion // ""')"
          echo "Latest completed CI conclusion for ${sha}: ${latest:-<none>}"
          if [ "$latest" != "success" ]; then
            echo "::error::CI for ${sha} is not green (latest: ${latest:-none}). Refusing to publish :latest."
            exit 1
          fi
          echo "CI is green for ${sha} — deploy of :latest allowed."

  build-and-push:
    name: Build and push Docker images to GHCR
    needs: [verify-ci]
    runs-on: ubuntu-latest
    # Run on a (gated) manual dispatch, on a v* tag push, or when the triggering CI passed.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    # Only this job needs to write packages.
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - name: app
            dockerfile: Dockerfile.app
            context: .
          - name: mcp
            dockerfile: Dockerfile.mcp
            context: .

    steps:
      # Resolve the commit to build and the tag set per trigger. Every build publishes an
      # immutable sha-<sha> tag (rollback); :latest moves ONLY on a release tag or a gated
      # manual dispatch — never on a plain main push.
      - name: Resolve commit + image tags
        id: meta
        run: |
          sha="${{ github.event.workflow_run.head_sha || github.sha }}"
          base="ghcr.io/${{ github.repository_owner }}/procure-ai-${{ matrix.name }}"
          tags="${base}:sha-${sha}"
          case "${{ github.event_name }}" in
            push)               # v* tag → release: move :latest and add the version tag
              tags="${tags}"$'\n'"${base}:latest"$'\n'"${base}:${{ github.ref_name }}" ;;
            workflow_dispatch)  # gated escape hatch → also move :latest
              tags="${tags}"$'\n'"${base}:latest" ;;
            # workflow_run (CI on main) → sha-only; :latest (production) is left untouched.
          esac
          {
            echo "sha=${sha}"
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # CI-triggered: check out the exact commit CI validated. Tag/manual: the resolved
      # github.sha (tag commit or selected ref HEAD).
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ steps.meta.outputs.sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # Built-in token, no extra PAT needed for push.
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          # sha-<sha> always (rollback); :latest + :<tag> only on release/dispatch (see meta step).
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
