name: Deploy b24-controller

# Авто-выкладка PHP-контроллеров shef.purchase на коробку Bitrix24.
#
#   - push в main → после ЗЕЛЁНОГО CI, если менялись b24-controller/**, деплой на
#     STAGING (tstb24) автоматически;
#   - workflow_dispatch → деплой на выбранное окружение; PRODUCTION (b24) проходит
#     через GitHub Environment c required reviewer (человек в контуре).
#
# Бэкап прежних версий, php -l config.php и пост-деплой read-only health-чек —
# встроены в scripts/deploy-b24-controller.sh (PR #100). Здесь только транспорт.
#
# ── Требуется настроить в репозитории (Settings) ───────────────────────────────
#   Environments: `staging` и `production`.
#     • production → Protection rules → Required reviewers (ручной аппрув).
#   Secrets каждого окружения (Environment secrets):
#     B24_SSH_HOST, B24_SSH_USER, B24_SSH_PORT, B24_SSH_PASS,
#     B24_CONTROLLERS_PATH, WEBHOOK_URL  (вебхук ТОЙ ЖЕ коробки!)
#   Без этих секретов job упадёт на обязательном WEBHOOK_URL — это ожидаемо.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Окружение деплоя
        type: choice
        options: [staging, production]
        default: staging

# Не отменять идущий деплой; параллельные — в очередь по окружению.
concurrency:
  group: deploy-b24-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'staging' }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  detect:
    name: Что и куда деплоить
    runs-on: ubuntu-latest
    # workflow_run — только при успешном CI; workflow_dispatch — всегда.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      changed: ${{ steps.f.outputs.changed }}
      target_env: ${{ steps.f.outputs.target_env }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - id: f
        env:
          EVENT: ${{ github.event_name }}
          INPUT_ENV: ${{ inputs.environment }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          set -euo pipefail
          # Ручной запуск — деплоим на выбранное окружение всегда.
          if [ "$EVENT" = "workflow_dispatch" ]; then
            echo "target_env=${INPUT_ENV}" >> "$GITHUB_OUTPUT"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Ручной запуск → деплой на ${INPUT_ENV}."
            exit 0
          fi
          # Авто после CI — только staging и только если менялись наши PHP-файлы.
          echo "target_env=staging" >> "$GITHUB_OUTPUT"
          changed=$(git diff --name-only "${HEAD_SHA}~1" "${HEAD_SHA}" -- \
            'b24-controller/lib/controllers/procure*.php' \
            'b24-controller/lib/config.php' || true)
          if [ -n "$changed" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Изменены b24-controller — деплой на staging:"; echo "$changed" | sed 's/^/  - /'
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "b24-controller не менялся — деплой не нужен."
          fi

  deploy:
    name: Деплой → ${{ needs.detect.outputs.target_env }}
    needs: detect
    if: ${{ needs.detect.outputs.changed == 'true' }}
    runs-on: ubuntu-latest
    # Привязка к GitHub Environment → применяются его secrets и protection rules
    # (для production — required reviewer: job будет ждать ручного аппрува).
    environment: ${{ needs.detect.outputs.target_env }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Установить sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      - name: Зафиксировать host-key (до деплоя)
        env:
          H: ${{ secrets.B24_SSH_HOST }}
          P: ${{ secrets.B24_SSH_PORT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keyscan -p "${P:-22}" "$H" >> ~/.ssh/known_hosts 2>/dev/null
          chmod 600 ~/.ssh/known_hosts

      - name: Деплой (APPLY=1) + бэкап + health
        env:
          B24_SSH_HOST: ${{ secrets.B24_SSH_HOST }}
          B24_SSH_USER: ${{ secrets.B24_SSH_USER }}
          B24_SSH_PORT: ${{ secrets.B24_SSH_PORT }}
          B24_SSH_PASS: ${{ secrets.B24_SSH_PASS }}
          B24_CONTROLLERS_PATH: ${{ secrets.B24_CONTROLLERS_PATH }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          APPLY: "1"
        run: bash scripts/deploy-b24-controller.sh
