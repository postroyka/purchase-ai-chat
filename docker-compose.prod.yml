version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
      mcp:
        condition: service_started
    env_file:
      - .env.prod
    environment:
      REDIS_URL: redis://redis:6379
    volumes:
      - uploads:/app/uploads
    networks:
      - procure-net
    restart: unless-stopped

  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    env_file:
      - .env.prod
    networks:
      - procure-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - procure-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  procure-net:
    driver: bridge

volumes:
  uploads:
  redis-data:
