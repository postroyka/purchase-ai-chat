version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    # Bind to loopback only — a reverse proxy (nginx) terminates TLS and
    # exposes the service publicly. See docker-compose.nginxproxy.yml.
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      redis:
        condition: service_healthy
      mcp:
        condition: service_healthy
    env_file:
      - .env.prod
    environment:
      REDIS_URL: redis://redis:6379
    volumes:
      - uploads:/app/uploads
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - procure-net
    restart: unless-stopped

  mcp:
    build:
      context: ./mcp
      dockerfile: Dockerfile
    env_file:
      - .env.prod
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - procure-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - procure-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  procure-net:
    driver: bridge

volumes:
  uploads:
  redis-data:
