# Local / single-host compose — runs the MCP server alone, bound to host port
# 3000. Use this as a base when you terminate TLS yourself (Caddy, Traefik,
# plain nginx + certbot) — see docs/REVERSE-PROXY.md for snippets.
#
# The shared docker-compose.yml is opinionated: it assumes the
# nginx-proxy + acme-companion stack on a `proxy-net` network. If you don't
# use that combo (most BR/LatAm hosts, many EU/US shops on Caddy/Traefik),
# this file is what you want.
#
# Every required env var has a safe default so `docker compose -f
# docker-compose.example.yml up` works even without a populated `.env`. The
# webhook URL stays unset — the server will refuse to start until it's
# supplied, which is the desired failure mode.
services:
  bx24-template-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bx24-template-mcp-local
    restart: unless-stopped
    # Port mapping: <host>:<container>. The container side MUST match NITRO_PORT
    # (and what the Dockerfile exposes). If you change NITRO_PORT, change BOTH
    # the right-hand side here AND the Dockerfile EXPOSE/HEALTHCHECK.
    ports:
      - '${HOST_PORT:-3000}:${NITRO_PORT:-3000}'
    environment:
      # Required — no default. Server bails on startup if missing.
      NUXT_BITRIX24_WEBHOOK_URL: ${NUXT_BITRIX24_WEBHOOK_URL}
      # Required for HTTP transport — clients send `Authorization: Bearer …`.
      # If you ever expose this beyond localhost, treat the absence of a
      # value as a deploy-blocker (mcp-auth middleware returns 503).
      NUXT_MCP_AUTH_TOKEN: ${NUXT_MCP_AUTH_TOKEN}
      # Optional — disables `bx24mcp_submit_feedback` when empty.
      NUXT_GITHUB_FEEDBACK_TOKEN: ${NUXT_GITHUB_FEEDBACK_TOKEN:-}
      NUXT_GITHUB_FEEDBACK_REPO: ${NUXT_GITHUB_FEEDBACK_REPO:-bitrix24/templates-mcp}
      NUXT_LOG_LEVEL: ${NUXT_LOG_LEVEL:-info}
      NITRO_PORT: ${NITRO_PORT:-3000}
      NODE_ENV: ${NODE_ENV:-production}
      # Self-hosted Bitrix24 with a private/self-signed CA: mount the bundle
      # and point Node at it. Leave unset for cloud portals (the Mozilla CA
      # list bundled with Node 22 covers every `*.bitrix24.<tld>` certificate).
      NODE_EXTRA_CA_CERTS: ${NODE_EXTRA_CA_CERTS:-}
      # Audit log + OAuth multi-tenant (opt-in). The flag stays off by
      # default — webhook flow is unchanged. See docs/DEPLOYMENT.md →
      # "OAuth 2.0 multi-tenant".
      NUXT_AUDIT_DIR: ${NUXT_AUDIT_DIR:-/data/audit}
      NUXT_BITRIX24_OAUTH_ENABLED: ${NUXT_BITRIX24_OAUTH_ENABLED:-false}
      NUXT_BITRIX24_OAUTH_CLIENT_ID: ${NUXT_BITRIX24_OAUTH_CLIENT_ID:-}
      NUXT_BITRIX24_OAUTH_CLIENT_SECRET: ${NUXT_BITRIX24_OAUTH_CLIENT_SECRET:-}
      NUXT_BITRIX24_OAUTH_REDIRECT_URL: ${NUXT_BITRIX24_OAUTH_REDIRECT_URL:-}
      NUXT_BITRIX24_OAUTH_SCOPE: ${NUXT_BITRIX24_OAUTH_SCOPE:-user,task}
      NUXT_BITRIX24_OAUTH_DB_DIR: ${NUXT_BITRIX24_OAUTH_DB_DIR:-/data}
      NUXT_BITRIX24_OAUTH_ADMIN_TOKEN: ${NUXT_BITRIX24_OAUTH_ADMIN_TOKEN:-}
    # Persistent storage for the audit log + OAuth token store. Required
    # whenever NUXT_BITRIX24_OAUTH_ENABLED=true; harmless (just empty) for
    # webhook-only forks. The named volume survives `docker compose down`
    # (but NOT `docker compose down -v` — that deletes ALL named volumes
    # including the audit log and OAuth tokens, irrecoverably).
    #
    # UPGRADE WARNING: deployments that ran an earlier image without this
    # volume kept audit JSONL files in the container's ephemeral layer at
    # `/data/audit/`. After `docker compose pull && up -d`, the named
    # volume mounts over `/data` and those files become invisible — for
    # compliance you MUST copy them out first:
    #     docker cp bx24-template-mcp-local:/data/audit ./audit-backup-$(date +%F)
    # Then `docker compose pull && docker compose up -d`. If you have no
    # earlier audit history, no action needed.
    volumes:
      - bx24_data:/data
      # Uncomment to mount a private CA bundle from the host. Adjust the
      # source path; the target must match NODE_EXTRA_CA_CERTS above.
      # - ./bitrix-internal-ca.pem:/etc/ssl/certs/bitrix-internal-ca.pem:ro

volumes:
  bx24_data:

