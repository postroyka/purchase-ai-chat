name: Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build and push Docker images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          # TODO: set repository secret GHCR_TOKEN (PAT with write:packages scope)
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set image tag
        id: meta
        run: echo "tag=ghcr.io/${{ github.repository_owner }}/procure-ai:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.app
          push: true
          # TODO: replace with your actual GHCR image path
          tags: |
            ghcr.io/${{ github.repository_owner }}/procure-ai-app:latest
            ghcr.io/${{ github.repository_owner }}/procure-ai-app:${{ github.sha }}

      - name: Build and push mcp image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.mcp
          push: true
          # TODO: replace with your actual GHCR image path
          tags: |
            ghcr.io/${{ github.repository_owner }}/procure-ai-mcp:latest
            ghcr.io/${{ github.repository_owner }}/procure-ai-mcp:${{ github.sha }}

  deploy:
    name: Deploy to production server
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          # TODO: set repository secrets DEPLOY_HOST and DEPLOY_KEY
          host: ${{ secrets.DEPLOY_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            # TODO: adjust the deployment directory path on the server
            cd /srv/procure-ai

            # Pull latest images from GHCR
            docker compose -f docker-compose.prod.yml pull

            # Restart services with zero-downtime rolling update
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Clean up old images
            docker image prune -f
