name: Deploy b24-controller

# Выкладка PHP-контроллеров shef.purchase на коробку Bitrix24 (ОДНА цель) — СИНХРОННО
# с прод-образами (.github/workflows/deploy.yml). Контроллеры не входят в Docker-образы
# (едут по SSH/rsync), поэтому это отдельный workflow, но с тем же релизным триггером:
#
#   - тег v* (релиз) → деплой контроллеров на коробку (APPLY=1). Тот же момент, когда
#     deploy.yml двигает образы на :latest → прод-PHP и прод-образы идут вместе.
#   - workflow_dispatch → ручной запуск; можно включить dry_run (симуляция, без записи).
#
# Авто-деплой на каждый push в main УБРАН намеренно: он рассинхронивал PHP (катился сразу)
# с образами (:latest только по тегу v*). Локальный `make deploy-b24 APPLY=1` остаётся
# рабочим как ручной путь без CI-гейта (отладка/ad-hoc).
#
# Цель задаётся через Repository secrets — упрощённый вариант (одно окружение), чтобы
# настроить без admin-доступа к Environments. Разделение на 2 окружения (staging +
# production по approval) — issue #112.
#
# Бэкап, php -l, авто-rollback при провале и read-only health-чек встроены в
# scripts/deploy-b24-controller.sh (#100/#110). Здесь — только транспорт.
#
# ⚠️ СЕТЕВОЙ ДОСТУП: GitHub-hosted раннеры ходят с динамических облачных IP. Если
#    SSH-порт коробки закрыт файрволом/по IP — деплой не дойдёт. Тогда используйте
#    self-hosted runner: замените `runs-on: ubuntu-latest` на ваш label.
#
# ── Настройка (Settings → Secrets and variables → Actions → Repository secrets) ──
#   B24_SSH_HOST, B24_SSH_USER, B24_SSH_PORT, B24_CONTROLLERS_PATH,
#   WEBHOOK_URL (вебхук ТОЙ ЖЕ коробки),
#   и ОДНО из: B24_SSH_PASS (пароль) ИЛИ deploy-key, настроенный на хосте.
#   Опц. (рекомендуется): B24_SSH_HOST_KEY — строка known_hosts сервера (пиннинг).

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: Симуляция (не писать на сервер)
        type: boolean
        default: false

# Один деплой за раз; параллельные — в очередь (не отменять идущий).
concurrency:
  group: deploy-b24
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Тег v* можно повесить на ЛЮБОЙ коммит (в т.ч. не прошедший CI), а workflow_dispatch
  # сам по себе CI не гоняет — поэтому, как и deploy.yml перед :latest, требуем ЗЕЛЁНЫЙ CI
  # на этом коммите. (CI бежит только на push в main и PR, не на теге.)
  verify-ci:
    name: Зелёный CI на этом коммите
    runs-on: ubuntu-latest
    permissions:
      actions: read   # читаем conclusions прогонов CI для этого SHA
    steps:
      - name: Требуем зелёный CI на этом SHA (тег v* / ручной запуск)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          sha="${{ github.sha }}"
          # Берём ПОСЛЕДНИЙ завершённый прогон CI для коммита — re-run мог переключить
          # результат, поэтому важно «последний зелёный», а не «когда-либо зелёный».
          latest="$(gh api -X GET \
            "repos/${{ github.repository }}/actions/workflows/ci.yml/runs" \
            -f head_sha="$sha" -f status=completed \
            --jq '[.workflow_runs[]] | sort_by(.created_at) | last | .conclusion // ""')"
          echo "Последний завершённый CI для ${sha}: ${latest:-<нет>}"
          if [ "$latest" != "success" ]; then
            echo "::error::CI для ${sha} не зелёный (последний: ${latest:-нет}). Деплой контроллеров отклонён."
            exit 1
          fi
          echo "CI зелёный для ${sha} — деплой контроллеров разрешён."

  deploy:
    name: Деплой b24-controller
    needs: [verify-ci]
    runs-on: ubuntu-latest   # коробка за firewall → замените на self-hosted (см. шапку)
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1
          ref: ${{ github.sha }}

      - name: Установить sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      - name: Подготовить known_hosts
        env:
          HK: ${{ secrets.B24_SSH_HOST_KEY }}
          H: ${{ secrets.B24_SSH_HOST }}
          P: ${{ secrets.B24_SSH_PORT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          if [ -n "${HK:-}" ]; then
            printf '%s\n' "$HK" >> ~/.ssh/known_hosts
            echo "host-key из secret B24_SSH_HOST_KEY (пиннинг)."
          else
            echo "::warning title=Host-key TOFU::B24_SSH_HOST_KEY не задан — ключ сервера принимается через ssh-keyscan без верификации (MitM-вектор на раннере). Задайте B24_SSH_HOST_KEY для пиннинга."
            ssh-keyscan -p "${P:-22}" "$H" >> ~/.ssh/known_hosts 2>/dev/null
          fi
          chmod 600 ~/.ssh/known_hosts

      - name: Деплой + бэкап + health
        env:
          B24_SSH_HOST: ${{ secrets.B24_SSH_HOST }}
          B24_SSH_USER: ${{ secrets.B24_SSH_USER }}
          B24_SSH_PORT: ${{ secrets.B24_SSH_PORT }}
          B24_SSH_PASS: ${{ secrets.B24_SSH_PASS }}
          B24_CONTROLLERS_PATH: ${{ secrets.B24_CONTROLLERS_PATH }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          # dry_run (только из workflow_dispatch) → APPLY=0 (симуляция); тег v* → APPLY=1.
          APPLY: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '0' || '1' }}
        run: bash scripts/deploy-b24-controller.sh
