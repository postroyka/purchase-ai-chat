version: 2

updates:
  # Docker — allow patch updates within Node 22 only.
  # IMPORTANT: do NOT bump the Node major version without a deliberate decision.
  # Node 23+ removed corepack from the default distribution, which breaks pnpm
  # installation in our Dockerfiles. Any Node major bump requires updating
  # the corepack install step and validating the full build before merging.
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    ignore:
      # Block major and minor Node bumps — patch only (e.g. 22.16.0 → 22.17.0 ok,
      # 22 → 23 or 22 → 24 will be blocked).
      - dependency-name: node
        update-types:
          - version-update:semver-major
          - version-update:semver-minor

  # GitHub Actions — patch/minor only, block major bumps.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  # Backend npm deps.
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly

  # UI npm deps.
  - package-ecosystem: npm
    directory: /ui
    schedule:
      interval: weekly

  # MCP npm deps.
  - package-ecosystem: npm
    directory: /mcp
    schedule:
      interval: weekly
