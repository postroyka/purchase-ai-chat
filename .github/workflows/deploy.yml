name: Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build and push Docker images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          # TODO: set repository secret GHCR_TOKEN (PAT with write:packages scope)
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set image tag
        id: meta
        run: echo "tag=ghcr.io/${{ github.repository_owner }}/procure-ai:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push app image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: Dockerfile.app
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/procure-ai-app:latest
            ghcr.io/${{ github.repository_owner }}/procure-ai-app:${{ github.sha }}

      - name: Build and push mcp image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: Dockerfile.mcp
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/procure-ai-mcp:latest
            ghcr.io/${{ github.repository_owner }}/procure-ai-mcp:${{ github.sha }}

  deploy:
    name: Deploy to production server
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        with:
          # TODO: set repository secrets DEPLOY_HOST and DEPLOY_KEY
          host: ${{ secrets.DEPLOY_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /srv/procure-ai
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
