name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend lint, syntax & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          package_json_file: mcp/package.json

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.16.0"

      - name: Verify Node + corepack + pnpm versions
        run: node --version && corepack --version && pnpm --version

      - name: Install dependencies
        working-directory: backend
        run: pnpm install --frozen-lockfile

      - name: Check syntax
        run: |
          node --check backend/index.js
          node --check backend/agent-runner.js
          node --check backend/jobs-store.js
          node --check backend/extract-text.js
          node --check backend/metrics.js

      - name: Run tests
        working-directory: backend
        run: pnpm test

      - name: Python doc-extractor tests (doc_to_text.py)
        run: |
          python3 -m venv /tmp/venv
          /tmp/venv/bin/pip install -q -r backend/requirements.txt pytest
          /tmp/venv/bin/pytest backend/tests/test_doc_to_text.py -q

  mcp:
    name: MCP lint, typecheck & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          package_json_file: mcp/package.json

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.16.0"

      - name: Install dependencies
        working-directory: mcp
        run: pnpm install --frozen-lockfile

      - name: Generate Nuxt types (required by eslint config)
        working-directory: mcp
        run: pnpm nuxt prepare

      - name: Lint
        working-directory: mcp
        run: pnpm lint

      - name: Run tests
        working-directory: mcp
        run: pnpm test

      - name: Build
        working-directory: mcp
        run: pnpm build

  test-mcp-overlay:
    name: Test mcp-overlay deals tools
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          package_json_file: mcp/package.json

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.16.0"
          cache: pnpm
          cache-dependency-path: mcp/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Guard — deals must not exist in upstream mcp
        run: '[ ! -e server/mcp/tools/deals ] || (echo "ERROR: deals already exists in upstream (file or dir) — overlay conflict" && exit 1)'

      - run: cp -r ../mcp-overlay/server/mcp/tools/deals server/mcp/tools/deals

      # Copy overlay tests into mcp/tests/ so vitest's default include
      # pattern (tests/**/*.test.ts) picks them up without config overrides.
      - run: cp -r ../mcp-overlay/tests/unit tests/overlay

      - run: pnpm exec vitest run tests/overlay

  docker-validate:
    name: Validate Docker builds & OCR deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Full runtime build so the apk/pip OCR & office deps (incl. tesseract-ocr-data-bel)
      # are validated in CI — not only on deploy via Watchtower.
      - name: Build full app image
        run: docker build -f Dockerfile.app -t procure-app-validate .

      - name: Verify OCR/office tooling inside the image
        run: |
          docker run --rm procure-app-validate sh -c '
            set -e
            pdftotext -v 2>&1 | head -1
            tesseract --list-langs
            python3 -c "import openpyxl, xlrd, docx; print(\"py libs OK\")"
          '

      - name: Build mcp image (builder stage)
        run: docker build --target builder -f Dockerfile.mcp -t procure-mcp-validate .

      # Catch YAML/interpolation errors in the compose files (incl. project isolation).
      - name: Validate compose files
        run: |
          trap 'rm -f .env.prod' EXIT   # always remove the dummy env, even on failure
          printf '%s\n' \
            'REDIS_PASSWORD=ci-dummy' \
            'BACKEND_API_TOKEN=ci-dummy' \
            'NUXT_MCP_AUTH_TOKEN=ci-dummy' \
            'NUXT_BITRIX24_WEBHOOK_URL=http://example.invalid' \
            'PUBLIC_PAGE_BASIC_AUTH_PASS=ci-dummy' \
            'VIRTUAL_HOST=example.invalid' \
            'LETSENCRYPT_HOST=example.invalid' \
            'LETSENCRYPT_EMAIL=ci@example.invalid' > .env.prod
          docker compose -p procure-ai -f docker-compose.prod.yml --env-file .env.prod config --quiet
          docker compose -p procure-proxy -f docker-compose.nginxproxy.yml --env-file .env.prod config --quiet

  ui:
    name: UI lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          package_json_file: mcp/package.json

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.16.0"

      - name: Install dependencies
        working-directory: ui
        run: pnpm install --frozen-lockfile

      - name: Generate Nuxt types (required by eslint config)
        working-directory: ui
        run: pnpm nuxt prepare

      - name: Lint
        working-directory: ui
        run: pnpm lint

      - name: Build
        working-directory: ui
        run: pnpm build
