<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Procure AI bot avatar">
  <defs>
    <!-- Background gradient matching the ogimage -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1b3a63"/>
      <stop offset="0.55" stop-color="#16345c"/>
      <stop offset="1" stop-color="#0f2747"/>
    </linearGradient>
    <!-- Robot head body gradient -->
    <linearGradient id="head" x1="148" y1="150" x2="364" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#13294a"/>
      <stop offset="1" stop-color="#0a1c36"/>
    </linearGradient>
    <!-- Cyan accent gradient -->
    <linearGradient id="cyan" x1="160" y1="200" x2="352" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5fd7ff"/>
      <stop offset="1" stop-color="#2aa8e0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#5fd7ff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#5fd7ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Concentric guide rings (subtle), like the ogimage -->
  <g stroke="#5fd7ff" stroke-opacity="0.07" fill="none">
    <circle cx="256" cy="262" r="150"/>
    <circle cx="256" cy="262" r="200"/>
  </g>

  <!-- Ambient glow behind the head -->
  <circle cx="256" cy="266" r="150" fill="url(#glow)"/>

  <!-- Antenna -->
  <line x1="256" y1="150" x2="256" y2="116" stroke="#5fd7ff" stroke-width="10" stroke-linecap="round"/>
  <circle cx="256" cy="104" r="16" fill="url(#cyan)"/>
  <circle cx="256" cy="104" r="26" fill="url(#glow)"/>

  <!-- Robot head -->
  <rect x="146" y="150" width="220" height="200" rx="48" fill="url(#head)" stroke="#2f5a8c" stroke-width="4"/>

  <!-- Face screen -->
  <rect x="176" y="188" width="160" height="124" rx="30" fill="#0a1729" stroke="#1c3a60" stroke-width="3"/>

  <!-- Eyes -->
  <circle cx="222" cy="248" r="20" fill="url(#cyan)"/>
  <circle cx="290" cy="248" r="20" fill="url(#cyan)"/>
  <circle cx="222" cy="248" r="30" fill="url(#glow)"/>
  <circle cx="290" cy="248" r="30" fill="url(#glow)"/>

  <!-- Smile -->
  <path d="M214 282 q42 30 84 0" stroke="#5fd7ff" stroke-width="7" stroke-linecap="round" fill="none"/>

  <!-- Ear modules -->
  <rect x="128" y="232" width="20" height="56" rx="8" fill="#2aa8e0"/>
  <rect x="364" y="232" width="20" height="56" rx="8" fill="#2aa8e0"/>

  <!-- "AI" badge / chip neck -->
  <rect x="206" y="360" width="100" height="52" rx="16" fill="#0a1c36" stroke="#2f5a8c" stroke-width="3"/>
  <text x="256" y="396" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="34" fill="#5fd7ff" letter-spacing="2">AI</text>

  <!-- Spark accent -->
  <g transform="translate(330,176)">
    <path d="M0 -18 L5 -5 L18 0 L5 5 L0 18 L-5 5 L-18 0 L-5 -5 Z" fill="#5fd7ff"/>
  </g>
</svg>
