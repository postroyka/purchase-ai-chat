name: Deploy

# Build images and publish them to GHCR.
# Triggered only after the CI workflow succeeds on main — this gates the
# deploy on the full test suite (backend, mcp, ui, test-mcp-overlay), so a
# broken overlay can never reach production.
# The production server runs Watchtower, which polls GHCR (~5 min) and
# recreates the containers automatically — no SSH deploy step here.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  # Manual escape hatch: run the deploy without a CI workflow_run event — e.g. when Actions
  # runners were unavailable so CI could not gate the deploy, or to re-publish images on demand.
  # Pick the branch/ref in the Actions UI; its HEAD (github.sha) is built and pushed.
  workflow_dispatch:

# Prevent concurrent deploys — if two pushes land close together, cancel
# the older run so only the latest commit reaches production.
concurrency:
  group: deploy-production
  cancel-in-progress: true

# Supply-chain hardening: minimal default permissions.
permissions:
  contents: read

jobs:
  build-and-push:
    name: Build and push Docker images to GHCR
    runs-on: ubuntu-latest
    # Run when the triggering CI workflow passed, OR on a manual dispatch (escape hatch).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    # Only this job needs to write packages.
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - name: app
            dockerfile: Dockerfile.app
            context: .
          - name: mcp
            dockerfile: Dockerfile.mcp
            context: .

    steps:
      # CI-triggered deploy: check out the exact commit CI validated. Manual dispatch: fall
      # back to the HEAD of the selected branch/ref (github.sha).
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # Built-in token, no extra PAT needed for push.
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          # latest for Watchtower; sha-<sha> enables rollback to a specific build.
          tags: |
            ghcr.io/${{ github.repository_owner }}/procure-ai-${{ matrix.name }}:latest
            ghcr.io/${{ github.repository_owner }}/procure-ai-${{ matrix.name }}:sha-${{ github.event.workflow_run.head_sha || github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
