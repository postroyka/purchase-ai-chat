name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commitlint:
    name: Commit messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          # No git push from this job — don't leave GITHUB_TOKEN in .git/config.
          persist-credentials: false
      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Both commitlint steps below pass the GitHub-event payload through
      # `env:` rather than interpolating `${{ … }}` directly inside `run:`.
      # That neutralises the script-injection class (see #171 and GitHub's
      # security-hardening guide). SHA values can't carry shell
      # metacharacters today, but the env-shim keeps the pattern uniform —
      # the next contributor copies the right shape. The `lint` job has a
      # regex guard that fails the build if a user-controllable event field
      # (title/body/message) is re-introduced inline.
      - name: Lint PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: echo "$PR_TITLE" | pnpm exec commitlint
      - name: Lint commit messages
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: pnpm exec commitlint --from="$BASE_SHA" --to="$HEAD_SHA"

  # Shell linter for `scripts/*.sh`. Catches the class of bugs a syntax-only
  # `bash -n` step won't (unquoted expansions where word-splitting matters,
  # pipe-buffering surprises, SC2155 declare-and-assign, missing `--`
  # separators, etc.). Runs at the default severity baseline (`style` — the
  # strictest); the only file in scope today (`verify-deployment.sh`,
  # ~430 lines) is clean against it, so any new finding is a real regression
  # rather than legacy noise. `external_sources: true` is `shellcheck -x`,
  # follows sourced files (no-op today; future-proof).
  #
  # Advisory mode (`continue-on-error: true`): findings show on the PR but do
  # NOT block merge. Rationale: issue #163 tracks a possible bash→TypeScript
  # migration of `verify-deployment.sh`; making this a hard gate now would
  # become dead weight if the migration lands. Flip to blocking by deleting
  # the `continue-on-error` line once the migration question is settled. The
  # job is still in the `ci` aggregate `needs:` list so its run-status is
  # visible at merge review.
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # v2.0.0
        with:
          scandir: ./scripts

  # Behavioural coverage for verify-deployment.sh argument validation (the
  # numeric guards and --resolve shape). Pure bash, no server/network — exits
  # before any curl. Blocking (unlike the advisory `shellcheck` job): a
  # regression in the operator-facing validation contract is a real bug.
  shell-tests:
    name: Shell behaviour tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: verify-deployment.sh argument validation
        run: bash tests/shell/verify-deployment-args.test.sh

  compose-validate:
    name: Compose config validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Validate docker-compose files
        run: |
          docker compose -f docker-compose.yml config --quiet
          docker compose -f docker-compose.server.yml config --quiet
          docker compose -f docker-compose.example.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.watchtower.yml config --quiet
      - name: Verify pinned infra image digests resolve in the registry
        run: |
          # Catch a typo'd or nonexistent @sha256 pin at PR time, instead of on a
          # production host during `make redeploy`. Only infra images are digest-
          # pinned (the app image rides :latest), so scope the check to them.
          set -euo pipefail
          grep -hoE '(nginxproxy|containrrr)/[a-z-]+:[0-9.]+@sha256:[0-9a-f]{64}' \
            docker-compose.server.yml docker-compose.watchtower.yml | sort -u | while read -r ref; do
            echo "Resolving $ref"
            docker buildx imagetools inspect "$ref" >/dev/null
          done

  # Static analysers for the workflow files themselves. Advisory mode while
  # the first runs settle and findings are triaged — the existing `lint` job
  # below has a narrow regex guard ("Guard against expression-injection")
  # that only catches `${{ github.event.*.(title|body|message) }}` inlined
  # in `run:`. These two analysers close the class:
  #   - actionlint: workflow syntax, expression validation, permissions
  #     auditing, deprecated/mutable `uses:` refs, shellcheck integration.
  #   - zizmor: security-focused — template injection across all event
  #     paths and `vars.*` / `secrets.*`, artifact poisoning, dangerous
  #     triggers, excessive permissions, secrets exposure.
  # See #175. Acceptance (concrete): flip `continue-on-error: false` and
  # remove the regex guard in the `lint` job once issue #178 closes (all
  # zizmor findings either fixed or annotated) AND no new findings have
  # appeared on `main` for one release cycle (≥ 2 weeks of merged PRs).
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      # Match `zizmor` job below: explicit read-only.
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # `persist-credentials: false` keeps zizmor's own `artipacked`
          # rule quiet on this PR and is good hygiene (the job never pushes).
          persist-credentials: false
      - name: Install and run actionlint
        env:
          # Tool version + SHA-256 of the official release tarball.
          # Update BOTH together; the sha256sum step below fails loudly if
          # they drift, so a forgetful bump cannot land a backdoored binary.
          # Trust boundary: github.com/rhysd/actionlint release artefacts.
          # Compute the SHA-256 of a new release like:
          #   curl -fsSLo /tmp/al.tgz "https://github.com/rhysd/actionlint/releases/download/v${VER}/actionlint_${VER}_linux_amd64.tar.gz"
          #   sha256sum /tmp/al.tgz
          ACTIONLINT_VERSION: "1.6.24"
          ACTIONLINT_SHA256: "3c5818744143a5d6754edd3dcc4c2b32c9dfcdd3bb30e0e108fb5e5c505262d4"
        run: |
          tarball="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          curl -fsSLo "$tarball" "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/${tarball}"
          echo "${ACTIONLINT_SHA256}  ${tarball}" | sha256sum --check --status
          tar xzf "$tarball" actionlint
          ./actionlint -color

  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      # zizmor reads workflow files from the checkout only.
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Same hygiene as the actionlint job above.
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@e639db99335bc9038abc0e066dfcd72e23d26fb4 # v0.3.0

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Pin envPrefix (guard against the #144 regression)
        # `vitest.config.ts` `envPrefix` is the entire reason a developer's
        # production `NUXT_*` from `.env` does not leak into the unit suite
        # (see #144 and CONTRIBUTING.md "Secrets"). Widening it back to a
        # permissive `'NUXT_'` would silently undo that. This step pins the
        # exact array; when you change `envPrefix` on purpose, update the
        # expected line below in the same commit.
        run: |
          expected="envPrefix: ['VITE_', 'NUXT_BITRIX24_TEST_', 'DEEPSEEK_'],"
          if ! grep -qF "$expected" vitest.config.ts; then
            echo "::error file=vitest.config.ts::envPrefix line drifted from the pinned value."
            echo "Expected to find: $expected"
            echo "If you changed envPrefix on purpose, update this guard in .github/workflows/ci.yml (lint job)."
            echo "If not, revert your change — widening invalidates the unit-suite isolation contract (see #144)."
            exit 1
          fi
      - name: Guard against expression-injection in `run:` blocks (security #171)
        # Catches the canonical single-line script-injection pattern: a
        # `run` step that interpolates a user-controllable event field
        # (title / body / message) directly inline. Those fields belong in
        # `env:` (see the commitlint job above and CONTRIBUTING.md
        # "CI authoring rule"). Hex-only fields (`.sha`, `.ref`, `.actor`)
        # can't carry shell metacharacters and are not flagged.
        #
        # Self-match guard: the grep pipeline below filters out comment
        # lines (lines whose first non-whitespace character is `#`) so the
        # rule can describe itself without tripping itself.
        #
        # Known blind spot: multi-line `run: |` blocks where the
        # interpolation lives on a later line escape this regex; same for
        # `${{ vars.* }}` and `${{ secrets.* }}` inlined in scripts. The
        # `actionlint` and `zizmor` jobs above (added by #175) close that
        # gap. Once they flip from advisory to blocking, delete this
        # guard — it becomes a strict subset of what they cover.
        run: |
          pattern='run:.*\$\{\{[^}]*github\.event\.[^}]*\.(title|body|message)[^}]*\}\}'
          hits=$(grep -rnE "$pattern" .github/workflows/ | grep -vE ':[[:space:]]*#' || true)
          if [ -n "$hits" ]; then
            echo "::error::Direct interpolation of a user-controllable GitHub-event field into a run: block detected. Bind it through env: instead (see #171 and CONTRIBUTING.md 'CI authoring rule')."
            echo "$hits"
            exit 1
          fi
          echo "OK: no script-injection patterns in run: blocks."
      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # No git push from this job — don't leave GITHUB_TOKEN in .git/config.
          persist-credentials: false
      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # No git push from this job — don't leave GITHUB_TOKEN in .git/config.
          persist-credentials: false
      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:unit

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Audit reads only the lockfile — no git credentials needed. Drop
          # them so they can't persist (zizmor `artipacked`).
          persist-credentials: false
      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 22
      # Blocks merges on known advisories (moderate and above). pnpm audit
      # reads the resolved tree from pnpm-lock.yaml directly — no install
      # needed. Remediate by bumping the direct dep or pinning a patched
      # version via `overrides` in pnpm-workspace.yaml.
      - run: pnpm audit --audit-level=moderate

  integration:
    name: Integration tests (Bitrix24)
    runs-on: ubuntu-latest
    # Forks can't read secrets, so the suite would always skip there — don't
    # waste a runner. On push (after merge) and same-repo PRs we proceed; if
    # the secret happens to be unset the step below emits a warning and the
    # tests skip themselves rather than fail.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    env:
      NUXT_BITRIX24_TEST_WEBHOOK_URL: ${{ secrets.BITRIX24_TEST_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # No git push from this job — don't leave GITHUB_TOKEN in .git/config.
          persist-credentials: false
      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Warn when test webhook secret is missing
        if: env.NUXT_BITRIX24_TEST_WEBHOOK_URL == ''
        run: echo "::warning::BITRIX24_TEST_WEBHOOK_URL secret is not set — live Bitrix24 checks will be skipped."
      - run: pnpm test:integration

  prepare-windows:
    name: nuxt prepare (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # No git push from this job — don't leave GITHUB_TOKEN in .git/config.
          persist-credentials: false
      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm nuxt prepare

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, prepare-windows]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # No git push from this job — don't leave GITHUB_TOKEN in .git/config.
          persist-credentials: false
      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  scaffold-sync:
    name: Manual-QA scaffold sync
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'scaffold-sync-exempt')
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Require scaffold update when .env.example changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          changed="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          scaffold="skills/run-manual-qa/references/issue-scaffold.md"
          if echo "$changed" | grep -qx ".env.example"; then
            if ! echo "$changed" | grep -qx "$scaffold"; then
              echo "::error::.env.example changed but $scaffold was not updated in the same PR."
              echo "The scaffold mirrors env vars / port / endpoint / scopes (see manage-bx24-template-mcp/SKILL.md Ground Rule 5)."
              echo "Update $scaffold, or — if the change touches no scaffold-relevant fact — add the label 'scaffold-sync-exempt' to this PR."
              exit 1
            fi
          fi

  # Closes the long-standing "self-hosted HTTP deployment path has never
  # been booted in CI" gap (issue #131). Builds the production Dockerfile,
  # boots the container without the proxy stack, and pins the externally-
  # observable contract end-to-end on every PR:
  #
  #   /api/health        → 200 {"status":"ok",...}
  #   /mcp  (no  auth)   → 401
  #   /mcp  (wrong tok)  → 401
  #   /mcp  (good  tok)  → NOT 401 / 403 / 503  (auth passed; toolkit may
  #                                              answer 200/202/405 to GET)
  #   /mcp  (placeholder)→ 503  (separate boot with the .env.example value;
  #                              pins the "copied-but-not-configured" gate)
  #
  # Does NOT call Bitrix24 — the webhook URL is a non-resolving placeholder.
  # If a future tool starts dialling out at boot, this job will tell you by
  # surfacing the failure in container logs.
  docker-smoke:
    name: Docker smoke
    runs-on: ubuntu-latest
    # 25 min on a cold GHA cache: pnpm install (~3m) + nuxt build (~3m) +
    # buildx image layers + two container boots + health waits + cleanup.
    # Steady-state with a populated `Build`-cache run is sub-2m.
    timeout-minutes: 25
    # Operator escape hatch: PRs labelled `ci:skip-docker-smoke` skip this
    # job. The aggregate `ci` gate counts `skipped` as non-blocking
    # (success-or-skipped → "did not block"), so a labelled PR can merge
    # without exercising the Docker bring-up. Use ONLY when docker-smoke
    # itself is the confirmed flaky failure (e.g. cold GHA cache slot,
    # buildx storage hiccup) — NOT to bypass a real regression that the
    # job correctly flagged. The label appears on the PR page so the
    # bypass is visible at merge review.
    if: ${{ github.event_name != 'pull_request' || !contains(github.event.pull_request.labels.*.name, 'ci:skip-docker-smoke') }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Build production image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          load: true
          tags: bx24-template-mcp:smoke
          # Re-use the cache the `Build` job (and `deploy.yml`) populate so
          # this job doesn't repeat the full pnpm install + nuxt build on
          # every PR. cache-to is intentionally NOT set — we read, not write.
          # No `needs: [build]` so the two jobs run in parallel; on first
          # cache-miss the smoke job pays the full build cost (that's what
          # the 25-min timeout buys), every steady-state run benefits.
          cache-from: type=gha
      - name: Generate test Bearer + start `valid-token` container
        id: start
        run: |
          set -euo pipefail
          TOKEN="$(openssl rand -hex 32)"
          # Register the mask before writing to outputs so any later log
          # line that echoes the token renders as `***`. Note: GHA masking
          # applies to log RENDERING — it does not strip the value from
          # the runner's internal environment-file snapshot or from a
          # third-party log sink ingesting GHA output. Treat the mask as
          # defence-in-depth, not a strong secrecy guarantee.
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
          # Non-resolving placeholder. The B24Hook is materialised lazily on
          # the first tool call (server/utils/bitrix24.ts), so boot succeeds
          # without DNS resolution and no outbound traffic leaves the runner.
          docker run -d --name bx24-smoke \
            -e NUXT_BITRIX24_WEBHOOK_URL=https://example.invalid/rest/1/x/ \
            -e NUXT_MCP_AUTH_TOKEN="$TOKEN" \
            -e NITRO_PORT=3000 \
            -p 3000:3000 \
            bx24-template-mcp:smoke
      - name: Assert the container runs as non-root (USER node from Dockerfile)
        # A regression in the Dockerfile (`USER node` dropped, or a build
        # stage that resets to root) would ship as a silent privilege
        # escalation in production. The compose hardening (`cap_drop: ALL`,
        # `no-new-privileges:true`) only mitigates this — it does not make
        # root inside the container OK.
        run: |
          set -euo pipefail
          UID_IN=$(docker exec bx24-smoke id -u)
          # Arithmetic compare (`-eq 0` not `= "0"`) so `id` variants that
          # emit `"00"`, `" 0"`, or numeric-with-trailing-newline can't
          # squeak past the string-equality check.
          if [ "$UID_IN" -eq 0 ]; then
            echo "::error::Container is running as root (uid=0). Dockerfile USER directive regressed."
            exit 1
          fi
          echo "OK — container runs as uid=$UID_IN (non-root)."
      - name: Run verify-deployment.sh against the `valid-token` container
        env:
          # Pass the token via env var, not `--token` argv, so it never
          # appears in /proc/<pid>/cmdline on the runner. The script reads
          # NUXT_MCP_AUTH_TOKEN automatically when --token / --token-stdin
          # aren't given.
          NUXT_MCP_AUTH_TOKEN: ${{ steps.start.outputs.token }}
        run: |
          ./scripts/verify-deployment.sh \
            --url http://localhost:3000 \
            --health-retries 30 \
            --health-interval 2 \
            --no-color
      - name: Boot a second `placeholder-token` container on port 3001
        # Pins the "operator copied .env.example without `openssl rand -hex 32`"
        # gate from server/middleware/mcp-auth.ts — that path is otherwise
        # only exercised by a unit test (no real boot of the auth middleware
        # under Nitro), so a regression there would slip through silently.
        #
        # Two parallel containers on DIFFERENT ports (3000 + 3001) avoids
        # the port-reuse race a `docker rm -f` + immediate re-run on the
        # same port hits on busy runners (kernel briefly holds the listen
        # socket past container teardown).
        run: |
          set -euo pipefail
          # NITRO_PORT=3000 inside the container, published as 3001 on
          # the host. If the Dockerfile ever changes the CMD's listen port
          # (or `EXPOSE` drifts), this mapping silently maps to a closed
          # port on the right-hand side; the health-wait below will then
          # timeout with no clear signal. The Dockerfile pins 3000 — keep
          # this `-e NITRO_PORT=3000 -p 3001:3000` shape in sync if it
          # ever changes.
          docker run -d --name bx24-smoke-placeholder \
            -e NUXT_BITRIX24_WEBHOOK_URL=https://example.invalid/rest/1/x/ \
            -e NUXT_MCP_AUTH_TOKEN=replace-with-secure-token \
            -e NITRO_PORT=3000 \
            -p 3001:3000 \
            bx24-template-mcp:smoke
          # Hand-rolled wait (not the script) because here we expect /mcp
          # to refuse with 503 — the script's purpose is the OPPOSITE
          # assertion. The duplication is intentional, not accidental.
          HEALTHY="no"
          for _ in $(seq 1 30); do
            STATUS=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 5 http://localhost:3001/api/health || echo "error")
            if [ "$STATUS" = "200" ]; then HEALTHY="yes"; break; fi
            sleep 2
          done
          if [ "$HEALTHY" != "yes" ]; then
            echo "::error::placeholder-token container never returned /api/health=200; cannot assert /mcp gate."
            docker logs bx24-smoke-placeholder 2>&1 | tail -200 || true
            exit 1
          fi
          STATUS=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 5 http://localhost:3001/mcp)
          if [ "$STATUS" != "503" ]; then
            echo "::error::With NUXT_MCP_AUTH_TOKEN=replace-with-secure-token, /mcp must return 503 (not-configured). Got $STATUS. See server/middleware/mcp-auth.ts."
            echo "This is the gate that prevents a copy-pasted .env.example deployment from accepting a publicly-known token."
            exit 1
          fi
          echo "OK — /mcp correctly returned 503 with the placeholder token."
      - name: Container logs (on failure only)
        if: failure()
        # 500-line tail handles a Nitro cold-boot stack trace + the route
        # table dump that the toolkit emits at materialisation. Dump BOTH
        # containers' logs so a cascading failure across the two boots is
        # reconstructable from a single CI run.
        run: |
          echo "=== bx24-smoke (valid-token, port 3000) ==="
          docker logs bx24-smoke 2>&1 | tail -500 || true
          echo
          echo "=== bx24-smoke-placeholder (placeholder-token, port 3001) ==="
          docker logs bx24-smoke-placeholder 2>&1 | tail -500 || true
      - name: Cleanup
        if: always()
        run: |
          docker rm -f bx24-smoke 2>/dev/null || true
          docker rm -f bx24-smoke-placeholder 2>/dev/null || true

  # Aggregate gate. The `main` branch protection rule requires a single
  # status check named `ci` — this job is that gate. It depends on every
  # other job in the workflow, runs even when an upstream job was skipped
  # (commitlint / integration / scaffold-sync each skip on their own
  # conditions), and fails iff ANY dependency ended in `failure` or
  # `cancelled`. `success` and `skipped` both count as "did not block".
  #
  # When adding a new job above, add it to `needs:` here too — otherwise
  # the gate will green-light a PR where the new job failed.
  ci:
    name: ci
    runs-on: ubuntu-latest
    needs: [commitlint, shellcheck, shell-tests, compose-validate, actionlint, zizmor, lint, typecheck, test, audit, integration, prepare-windows, build, scaffold-sync, docker-smoke]
    if: always()
    steps:
      - name: Verify no required job failed or was cancelled
        env:
          NEEDS: ${{ toJson(needs) }}
        run: |
          echo "$NEEDS"
          if echo "$NEEDS" | grep -E '"result"[[:space:]]*:[[:space:]]*"(failure|cancelled)"' > /dev/null; then
            echo "::error::At least one required job failed or was cancelled."
            exit 1
          fi
