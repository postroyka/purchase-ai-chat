name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend lint & syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Check syntax
        run: node --check backend/index.js

  mcp:
    name: MCP lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Install dependencies
        working-directory: mcp
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: mcp
        run: pnpm lint || true

      - name: Build (type-check via Nuxt)
        working-directory: mcp
        run: pnpm build

  ui:
    name: UI lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Install dependencies
        working-directory: ui
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: ui
        run: pnpm lint || true

      - name: Build
        working-directory: ui
        run: pnpm build
