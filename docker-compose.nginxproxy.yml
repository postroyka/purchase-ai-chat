# Shared reverse-proxy — bring up ONLY if nginx-proxy is not already running
# on the server (грабли: don't bind 80/443 twice, the whole server would break).
# Run via: make init-nginxproxy
#
# Own project name so the app stack's `up --remove-orphans` (project `procure-ai`)
# cannot delete nginx-proxy/acme-companion. See docker-compose.prod.yml header.
name: procure-proxy

services:
  # nginx-proxy and acme-companion are intentionally NOT watched by Watchtower
  # (no watchtower.enable/scope labels): pinned infra images, updated manually.
  nginx-proxy:
    image: nginxproxy/nginx-proxy:1.6
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - nginx-certs:/etc/nginx/certs
      - nginx-vhost:/etc/nginx/vhost.d
      - nginx-html:/usr/share/nginx/html
    networks:
      - proxy-net
    restart: unless-stopped

  acme-companion:
    image: nginxproxy/acme-companion:2.5
    container_name: acme-companion
    depends_on:
      - nginx-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - nginx-certs:/etc/nginx/certs
      - nginx-vhost:/etc/nginx/vhost.d
      - nginx-html:/usr/share/nginx/html
      - acme-data:/etc/acme.sh
    environment:
      # Global Let's Encrypt email — lives here, not in per-app compose (грабли #2).
      - DEFAULT_EMAIL=${LETSENCRYPT_EMAIL}
      - NGINX_PROXY_CONTAINER=nginx-proxy
    networks:
      - proxy-net
    restart: unless-stopped

networks:
  proxy-net:
    external: true

# Pin to the volume names created under the old shared project (`procure-ai_*`)
# so the already-issued Let's Encrypt certificate is preserved after the rename
# (no re-issue). If they don't exist yet they are created empty and acme issues a cert.
volumes:
  nginx-certs:
    name: procure-ai_nginx-certs
  nginx-vhost:
    name: procure-ai_nginx-vhost
  nginx-html:
    name: procure-ai_nginx-html
  acme-data:
    name: procure-ai_acme-data
