name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend lint, syntax & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Check syntax
        run: node --check backend/index.js

      - name: Run tests
        working-directory: backend
        run: npm test

  mcp:
    name: MCP lint, typecheck & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Install dependencies
        working-directory: mcp
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: mcp
        run: pnpm lint || true

      - name: Run tests
        working-directory: mcp
        run: pnpm test

      - name: Build (type-check via Nuxt)
        working-directory: mcp
        run: pnpm build

  ui:
    name: UI lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Install dependencies
        working-directory: ui
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: ui
        run: pnpm lint || true

      - name: Build
        working-directory: ui
        run: pnpm build
