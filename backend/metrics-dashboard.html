<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>Procure AI — метрики</title>
<style>
  :root {
    --bg: #f5f6f8; --card: #fff; --ink: #1b1f24; --muted: #6b7480;
    --line: #e6e9ee; --accent: #2563eb;
    --ok: #16a34a; --warn: #d97706; --err: #dc2626; --neutral: #94a3b8;
    --shadow: 0 1px 2px rgba(16,24,40,.06), 0 1px 3px rgba(16,24,40,.05);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 28px 20px 64px; }
  header { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 22px; }
  h1 { font-size: 22px; margin: 0; letter-spacing: -.01em; }
  h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); margin: 28px 0 12px; }
  .meta { color: var(--muted); font-size: 13px; display: flex; align-items: center; gap: 12px; }
  button {
    font: inherit; color: var(--accent); background: #fff; border: 1px solid var(--line);
    border-radius: 8px; padding: 6px 12px; cursor: pointer;
  }
  button:hover { border-color: var(--accent); }

  /* indicator cards */
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 16px; box-shadow: var(--shadow); }
  .card .label { color: var(--muted); font-size: 12px; }
  .card .value { font-size: 26px; font-weight: 650; margin-top: 4px; letter-spacing: -.02em; }
  .card .sub { color: var(--muted); font-size: 12px; margin-top: 2px; }

  .grid2 { display: grid; grid-template-columns: 320px 1fr; gap: 16px; align-items: start; }
  @media (max-width: 720px) { .grid2 { grid-template-columns: 1fr; } }

  .panel { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 18px; box-shadow: var(--shadow); }

  /* donut */
  .donut-wrap { display: flex; align-items: center; gap: 16px; }
  .donut { position: relative; width: 132px; height: 132px; flex: none; }
  .donut .pct { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .donut .pct b { font-size: 26px; letter-spacing: -.02em; }
  .donut .pct span { font-size: 11px; color: var(--muted); }

  /* bar chart */
  .bars { display: flex; flex-direction: column; gap: 9px; }
  .bar { display: grid; grid-template-columns: 168px 1fr 56px; align-items: center; gap: 10px; }
  .bar .name { color: var(--ink); font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bar .track { background: #eef1f5; border-radius: 6px; height: 16px; overflow: hidden; }
  .bar .fill { height: 100%; border-radius: 6px; background: var(--accent); min-width: 2px; transition: width .3s; }
  .bar .num { text-align: right; font-variant-numeric: tabular-nums; color: var(--muted); }
  .bar.ok .fill { background: var(--ok); }
  .bar.warn .fill { background: var(--warn); }
  .bar.err .fill { background: var(--err); }
  .bar.neutral .fill { background: var(--neutral); }

  /* daily sparkline-ish columns */
  .days { display: flex; align-items: flex-end; gap: 4px; height: 120px; padding-top: 8px; }
  .day { flex: 1 1 0; display: flex; flex-direction: column; align-items: center; gap: 6px; min-width: 0; }
  .day .col { width: 100%; max-width: 26px; background: var(--accent); border-radius: 4px 4px 0 0; min-height: 2px; }
  .day .d { font-size: 10px; color: var(--muted); white-space: nowrap; transform: rotate(-45deg); transform-origin: top left; }

  .empty { color: var(--muted); padding: 8px 0; }
  .err-box { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; border-radius: 10px; padding: 12px 14px; }
  footer { margin-top: 32px; color: var(--muted); font-size: 12px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>📊 Procure AI — метрики использования</h1>
    <div class="meta">
      <span id="updated">загрузка…</span>
      <button id="refresh" type="button">Обновить</button>
    </div>
  </header>

  <div id="error" class="err-box" style="display:none"></div>

  <div class="cards" id="cards"></div>

  <h2 id="econHead" style="display:none">💰 Экономика (оценка)</h2>
  <div id="econ" class="panel" style="display:none">
    <div class="cards" id="econCards"></div>
    <div id="econNote" style="color:var(--muted);font-size:12px;margin-top:12px"></div>
  </div>

  <h2>Исходы обработки</h2>
  <div class="grid2">
    <div class="panel">
      <div class="donut-wrap">
        <div class="donut">
          <svg width="132" height="132" viewBox="0 0 132 132">
            <circle cx="66" cy="66" r="56" fill="none" stroke="#eef1f5" stroke-width="16"></circle>
            <circle id="donutArc" cx="66" cy="66" r="56" fill="none" stroke="var(--ok)" stroke-width="16"
                    stroke-linecap="round" transform="rotate(-90 66 66)"
                    stroke-dasharray="0 999"></circle>
          </svg>
          <div class="pct"><b id="donutPct">0%</b><span>сделок OK</span></div>
        </div>
        <div style="color:var(--muted);font-size:13px">
          Доля файлов, по которым агент дошёл до готовой сделки
          (<span id="okFiles">0</span> из <span id="totalFiles">0</span>).
        </div>
      </div>
    </div>
    <div class="panel">
      <div class="bars" id="outcomes"></div>
    </div>
  </div>

  <h2>Форматы файлов</h2>
  <div class="panel"><div class="bars" id="formats"></div></div>

  <h2>Способ извлечения текста</h2>
  <div class="panel"><div class="bars" id="extract"></div></div>

  <h2>Файлов по дням</h2>
  <div class="panel"><div class="days" id="daily"></div></div>

  <footer>
    Метрики «за всё время» (issue&nbsp;#67). Обновляется автоматически каждые 30&nbsp;с.
  </footer>
</div>

<script>
  const OUTCOME_LABELS = {
    ok: 'Сделка OK',
    tool_unavailable: 'Инструмент Б24 недоступен',
    file_unreadable: 'Файл не читается',
    unreadable_document: 'Скан без текста',
    unsupported_currency: 'Валюта не BYN',
    missing_responsible: 'Нет ответственного',
    timeout: 'Таймаут агента',
    agent_crash: 'Сбой агента',
    bad_output: 'Плохой вывод агента',
    cli_missing: 'CLI не найден',
    other: 'Прочее',
    other_error: 'Прочая ошибка',
    unknown: 'Неизвестно',
  };
  const EXTRACT_LABELS = {
    pdftotext: 'PDF: текстовый слой',
    ocr: 'OCR (скан/фото)',
    office: 'Excel / Word',
    unknown: 'Неизвестно',
  };
  // Outcomes considered "good" / "warning" for bar colouring.
  const WARN_OUTCOMES = new Set(['tool_unavailable', 'unsupported_currency', 'missing_responsible']);

  const $ = (id) => document.getElementById(id);

  function fmtMs(ms) {
    if (!ms) return '—';
    if (ms < 1000) return ms + ' мс';
    return (ms / 1000).toFixed(ms < 10000 ? 1 : 0) + ' с';
  }
  function fmtUsd(v) { return '$' + (Number(v) || 0).toFixed(v >= 1 ? 2 : 4); }
  function fmtByn(v) { return (Number(v) || 0).toLocaleString('ru-RU', { maximumFractionDigits: 2 }) + ' BYN'; }

  function card(label, value, sub) {
    const el = document.createElement('div');
    el.className = 'card';
    el.innerHTML = '<div class="label"></div><div class="value"></div><div class="sub"></div>';
    el.querySelector('.label').textContent = label;
    el.querySelector('.value').textContent = value;
    el.querySelector('.sub').textContent = sub || '';
    return el;
  }

  function renderBars(container, rows, { labels = {}, colorFn } = {}) {
    container.innerHTML = '';
    if (!rows || rows.length === 0) { container.innerHTML = '<div class="empty">Пока нет данных</div>'; return; }
    const max = Math.max(...rows.map((r) => r.count), 1);
    for (const r of rows) {
      const row = document.createElement('div');
      row.className = 'bar' + (colorFn ? ' ' + colorFn(r) : '');
      const pct = Math.round((r.count / max) * 100);
      row.innerHTML = '<div class="name"></div><div class="track"><div class="fill"></div></div><div class="num"></div>';
      row.querySelector('.name').textContent = labels[r.name] || r.name;
      row.querySelector('.fill').style.width = pct + '%';
      row.querySelector('.num').textContent = r.count;
      container.appendChild(row);
    }
  }

  function renderDaily(container, days) {
    container.innerHTML = '';
    if (!days || days.length === 0) { container.innerHTML = '<div class="empty">Пока нет данных</div>'; return; }
    const recent = days.slice(-30);
    const max = Math.max(...recent.map((d) => d.files), 1);
    for (const d of recent) {
      const col = document.createElement('div');
      col.className = 'day';
      const h = Math.round((d.files / max) * 100);
      col.innerHTML = '<div class="col" title=""></div><div class="d"></div>';
      const bar = col.querySelector('.col');
      bar.style.height = h + '%';
      bar.title = d.date + ': ' + d.files;
      col.querySelector('.d').textContent = d.date.slice(5); // MM-DD
      container.appendChild(col);
    }
  }

  function renderDonut(pct, ok, total) {
    const r = 56, c = 2 * Math.PI * r;
    const arc = $('donutArc');
    const len = Math.max(0, Math.min(100, pct)) / 100 * c;
    arc.setAttribute('stroke-dasharray', len + ' ' + (c - len));
    arc.setAttribute('stroke', pct >= 60 ? 'var(--ok)' : pct >= 25 ? 'var(--warn)' : 'var(--err)');
    $('donutPct').textContent = pct + '%';
    $('okFiles').textContent = ok;
    $('totalFiles').textContent = total;
  }

  function outcomeColor(r) {
    if (r.name === 'ok') return 'ok';
    if (WARN_OUTCOMES.has(r.name)) return 'warn';
    if (r.name === 'unknown') return 'neutral';
    return 'err';
  }

  async function load() {
    try {
      const res = await fetch('/metrics/data', { headers: { Accept: 'application/json' }, cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status + (res.status === 401 ? ' — требуется авторизация' : ''));
      const m = await res.json();
      $('error').style.display = 'none';

      const t = m.totals;
      const cards = $('cards');
      cards.innerHTML = '';
      cards.append(
        card('Загрузок', t.uploads, t.files + ' файлов всего'),
        card('Успешных сделок', t.ok, t.successRatePct + '% от файлов'),
        card('Ошибок (сбой)', t.filesError, 'агент упал/таймаут'),
        card('Стоимость, всего', fmtUsd(t.costUsd), t.costRuns + ' прогонов с ценой'),
        card('Сред. цена прогона', fmtUsd(t.avgCostUsd), 'на 1 запуск агента'),
        card('Сред. время агента', fmtMs(t.avgAgentMs), t.agentRuns + ' запусков'),
      );

      // Economics (issue #75) — shown only when an hourly rate is configured.
      const e = m.economics;
      if (e && e.enabled) {
        $('econHead').style.display = '';
        $('econ').style.display = '';
        const ec = $('econCards');
        ec.innerHTML = '';
        ec.append(
          card('Сэкономлено (оценка)', fmtByn(e.netSavedByn), 'нетто, ' + e.positions + ' позиций'),
          card('Потеря на пустых артикулах', fmtByn(e.lostNoArticleByn), e.positionsNoArticlePct + '% позиций без артикула'),
          card('Стоимость модели', fmtByn(e.modelCostByn), 'за всё время'),
          card('Позиций без артикула', e.positionsNoArticle, 'из ' + e.positions),
        );
        $('econNote').textContent = '⚠️ Оценка — ставка не подтверждена заказчиком. Допущения: '
          + e.hourlyRateByn + ' BYN/ч, ' + e.minutesPerPosition + ' мин/позицию, курс USD→BYN ' + e.usdByn
          + '. Настраивается в .env (HOURLY_RATE_BYN, MINUTES_PER_POSITION, USD_BYN_RATE).';
      } else {
        $('econHead').style.display = 'none';
        $('econ').style.display = 'none';
      }

      renderDonut(t.successRatePct, t.ok, t.files);
      renderBars($('outcomes'), m.outcomes, { labels: OUTCOME_LABELS, colorFn: outcomeColor });
      renderBars($('formats'), m.formats, { labels: {} });
      renderBars($('extract'), m.extract, { labels: EXTRACT_LABELS });
      renderDaily($('daily'), m.daily);

      const d = new Date(m.generatedAt);
      $('updated').textContent = 'обновлено ' + d.toLocaleString('ru-RU');
    } catch (e) {
      const box = $('error');
      box.style.display = 'block';
      box.textContent = 'Не удалось загрузить метрики: ' + e.message;
    }
  }

  $('refresh').addEventListener('click', load);
  load();
  setInterval(load, 30000);
</script>
</body>
</html>
